<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Providence Tutorials – Complete ERP</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
  
  :root {
    --navy: #0f2044;
    --gold: #c9a84c;
    --gold-light: #f0d98a;
    --cream: #fdf8f0;
    --green: #1a7a4a;
    --red: #c0392b;
    --blue: #1a5276;
    --sidebar-w: 240px;
    --card: #ffffff;
    --border: #e8e0d0;
    --text: #1a1a2e;
    --muted: #7a7a8a;
    --orange: #e67e22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }

  #sidebar {
    width: var(--sidebar-w);
    background: var(--navy);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    overflow-y: auto;
  }

  .logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(201, 168, 76, .25);
  }

  .logo h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 17px;
    line-height: 1.3;
  }

  .logo p {
    color: rgba(255, 255, 255, .5);
    font-size: 11px;
    margin-top: 2px;
  }

  nav { flex: 1; padding: 16px 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: rgba(255, 255, 255, .65);
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    transition: all .2s;
    border-left: 3px solid transparent;
  }

  .nav-item:hover { color: #fff; background: rgba(255,255,255,.06); }
  
  .nav-item.active {
    color: var(--gold);
    border-left-color: var(--gold);
    background: rgba(201, 168, 76, .1);
  }

  .nav-item .icon { font-size: 16px; width: 18px; text-align: center; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255, 255, 255, .1);
    color: rgba(255,255,255,.4);
    font-size: 11px;
  }

  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
    flex-wrap: wrap;
    gap: 10px;
  }

  .topbar h2 { font-size: 18px; font-weight: 600; color: var(--navy); }
  .topbar-date { font-size: 12px; color: var(--muted); }

  .session-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fdf8f0;
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 6px 14px;
  }

  .session-selector label {
    font-size: 11px;
    font-weight: 700;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: .4px;
    white-space: nowrap;
  }

  .session-selector select {
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    padding: 2px 4px;
  }

  .session-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
  }

  .content { padding: 28px; }

  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .stat-card.blue::before { background: var(--blue); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.gold::before { background: var(--gold); }
  .stat-card.orange::before { background: var(--orange); }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--navy);
    margin-top: 8px;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .panel-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fafaf8;
  }

  .panel-head h3 { font-size: 14px; font-weight: 600; color: var(--navy); }
  .panel-body { padding: 20px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-group.full { grid-column: 1/-1; }

  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  input, select, textarea {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: #fff;
    transition: border .2s;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,.12);
  }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 2px;
  }

  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary:hover { background: #162d5a; }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: #b8943e; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { background: #145e38; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover { background: #a93226; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--navy); color: var(--navy); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--muted);
    background: #fafaf8;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 11px 14px;
    border-bottom: 1px solid #f0ece4;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdf9f2; }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    margin: 2px;
  }

  .badge-green { background: #d4edda; color: #155724; }
  .badge-red { background: #f8d7da; color: #721c24; }
  .badge-yellow { background: #fff3cd; color: #856404; }
  .badge-blue { background: #cce5ff; color: #004085; }
  .badge-orange { background: #ffe5cc; color: #cc5500; }

  .modal-overlay {
    display: flex;
    position: fixed;
    inset: 0;
    background: rgba(15,32,68,.55);
    backdrop-filter: blur(3px);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .modal {
    background: #fff;
    border-radius: 14px;
    width: 90%;
    max-width: 650px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h3 { font-size: 16px; font-weight: 600; color: var(--navy); }
  .modal-close { 
    background: none; 
    border: none; 
    font-size: 24px; 
    cursor: pointer; 
    color: var(--muted);
    padding: 5px 10px;
    border-radius: 5px;
    transition: all 0.2s;
  }
  .modal-close:hover { 
    background: #f0f0f0; 
    color: var(--red); 
  }
  
  .modal-body { padding: 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .overdue-row { background: #fff5f5 !important; }
  .overdue-badge { animation: pulse 2s infinite; }

  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  .progress-bar {
    background: #eee;
    border-radius: 10px;
    height: 20px;
    width: 100px;
    display: inline-block;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.3s;
  }

  .progress-fill.good { background: var(--green); }
  .progress-fill.warning { background: var(--orange); }
  .progress-fill.danger { background: var(--red); }

  /* FIXED: Print styles - only show print window content */
  @media print {
    /* Hide everything by default */
    body > * {
      visibility: hidden !important;
    }
    
    /* Show only the print window */
    #print-window, #print-window * {
      visibility: visible !important;
    }
    
    #print-window {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: auto !important;
      margin: 0 !important;
      padding: 20px !important;
      z-index: 99999 !important;
      background: white !important;
    }
    
    /* Hide print buttons during print */
    .no-print {
      display: none !important;
    }
  }

  /* Print window overlay */
  .print-window-overlay {
    display: flex;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 9999;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 20px;
  }

  .print-window-content {
    background: white;
    border-radius: 12px;
    max-width: 800px;
    width: 100%;
    margin: 20px auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .print-window-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    border-bottom: 1px solid #ddd;
    background: #f8f8f8;
    border-radius: 12px 12px 0 0;
    position: sticky;
    top: 0;
  }

  .print-window-body {
    padding: 20px;
  }

  @media (max-width: 768px) {
    #sidebar { width: 60px; }
    #main { margin-left: 60px; }
    .nav-item span:not(.icon) { display: none; }
    .logo h1, .logo p { display: none; }
    .cards-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <h1>Providence<br>Tutorials</h1>
    <p>Complete ERP System</p>
  </div>
  <nav>
    <div class="nav-item active" onclick="showPage('dashboard')"><span class="icon">📊</span> <span>Dashboard</span></div>
    <div class="nav-item" onclick="showPage('students')"><span class="icon">👨‍🎓</span> <span>Students</span></div>
    <div class="nav-item" onclick="showPage('fees')"><span class="icon">💰</span> <span>Collect Fee</span></div>
    <div class="nav-item" onclick="showPage('records')"><span class="icon">🗂️</span> <span>Fee Records</span></div>
    <div class="nav-item" onclick="showPage('reminders')"><span class="icon">📲</span> <span>Reminders</span></div>
    <div class="nav-item" onclick="showPage('receipt')"><span class="icon">🖨️</span> <span>Receipt</span></div>
    <div class="nav-item" onclick="showPage('reports')"><span class="icon">📋</span> <span>Reports</span></div>
    <div class="nav-item" onclick="showPage('ledger')"><span class="icon">📘</span> <span>Ledger</span></div>
    <div class="nav-item" onclick="showPage('attendance')"><span class="icon">📅</span> <span>Attendance</span></div>
    <div class="nav-item" onclick="showPage('backup')"><span class="icon">💾</span> <span>Backup</span></div>
    <div class="nav-item" onclick="showPage('sessions')"><span class="icon">📆</span> <span>Sessions</span></div>
    <div class="nav-item" onclick="showPage('settings')"><span class="icon">⚙️</span> <span>Settings</span></div>
  </nav>
  <div class="sidebar-footer">© 2025 Providence Tutorials</div>
</div>

<!-- MAIN CONTENT -->
<div id="main">
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
      <h2 id="page-title">Dashboard</h2>
      <div class="session-selector">
        <label>📅 Session:</label>
        <select id="active-session-select" onchange="switchActiveSession()"></select>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <span class="topbar-date" id="today-date"></span>
      <span style="font-weight:600;" id="topbar-user">Admin</span>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>

  <div class="content" id="content-area">
    <!-- Pages dynamically rendered here -->
  </div>
</div>

<!-- MODALS CONTAINER -->
<div id="modals-container"></div>

<!-- PRINT WINDOW (separate overlay for preview and printing) -->
<div id="print-window" style="display:none;"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// COMPLETE JAVASCRIPT - FIXED PRINT FUNCTIONALITY
// ═══════════════════════════════════════════════════════════════

// ─── DATA LAYER ─────────────────────────────────────────────────
let students = JSON.parse(localStorage.getItem('pt_students') || '[]');
let payments = JSON.parse(localStorage.getItem('pt_payments') || '[]');
let sessions = JSON.parse(localStorage.getItem('pt_sessions') || '[]');
let activeSession = localStorage.getItem('pt_activeSession') || '';
let nextStudentId = parseInt(localStorage.getItem('pt_sid') || '1');
let nextReceiptId = parseInt(localStorage.getItem('pt_rid') || '1001');
let attendance = JSON.parse(localStorage.getItem('pt_attendance') || '{}');
let promotionLog = JSON.parse(localStorage.getItem('pt_promotionLog') || '[]');
let showOverdueOnly = false;

function saveAll() {
  localStorage.setItem('pt_students', JSON.stringify(students));
  localStorage.setItem('pt_payments', JSON.stringify(payments));
  localStorage.setItem('pt_sessions', JSON.stringify(sessions));
  localStorage.setItem('pt_activeSession', activeSession);
  localStorage.setItem('pt_sid', nextStudentId);
  localStorage.setItem('pt_rid', nextReceiptId);
  localStorage.setItem('pt_attendance', JSON.stringify(attendance));
  localStorage.setItem('pt_promotionLog', JSON.stringify(promotionLog));
}

// ─── MIGRATION ──────────────────────────────────────────────────
function migrateData() {
  if (!sessions.length) {
    const now = new Date();
    const yr = now.getFullYear();
    const month = now.getMonth();
    const startYr = month < 3 ? yr - 1 : yr;
    sessions.push({
      id: startYr + '-' + String(startYr + 1).slice(-2),
      startYear: startYr,
      endYear: startYr + 1,
      created: new Date().toISOString()
    });
    activeSession = sessions[0].id;
  }
  students.forEach(s => {
    if (!s.session) s.session = activeSession || sessions[0]?.id || '2025-26';
    if (!s.previousDue) s.previousDue = 0;
    if (!s.discount) s.discount = 0;
    if (!s.email) s.email = '';
    if (!s.photo) s.photo = '';
    if (!s.father) s.father = '';
    if (!s.wa) s.wa = '';
    if (!s.scholarNo) s.scholarNo = generateScholarNumber(s.class, s.session);
  });
  saveAll();
}

// ─── HELPER FUNCTIONS ───────────────────────────────────────────
function getActiveStudents() {
  return activeSession ? students.filter(s => s.session === activeSession) : students;
}

function getActivePayments() {
  const ids = new Set(getActiveStudents().map(s => s.id));
  return payments.filter(p => ids.has(p.studentId));
}

function getDeposited(studentId) {
  return payments.filter(p => p.studentId === studentId).reduce((sum, p) => sum + p.amount, 0);
}

function getDueMonths(student) {
  const joining = new Date(student.joining);
  const now = new Date();
  const firstDue = new Date(joining.getFullYear(), joining.getMonth() + 1, 1);
  if (firstDue > now) return 0;
  return Math.max(0, (now.getFullYear() - firstDue.getFullYear()) * 12 + (now.getMonth() - firstDue.getMonth()) + 1);
}

function getTotalDue(student) {
  const gross = getDueMonths(student) * student.monthlyFee;
  const deposited = getDeposited(student.id);
  const raw = gross - deposited + (student.previousDue || 0) - (student.discount || 0);
  return Math.max(0, raw);
}

function getAdvanceBalance(student) {
  const gross = getDueMonths(student) * student.monthlyFee;
  const deposited = getDeposited(student.id);
  const raw = gross - deposited + (student.previousDue || 0) - (student.discount || 0);
  return raw < 0 ? Math.abs(raw) : 0;
}

function isOverdue(student) {
  const today = new Date();
  return today.getDate() > 10 && getTotalDue(student) > 0;
}

function getNextPaymentDate(student) {
  const joining = new Date(student.joining);
  const dueMonths = getDueMonths(student);
  const advanceMonths = Math.floor(getAdvanceBalance(student) / student.monthlyFee);
  const firstDue = new Date(joining.getFullYear(), joining.getMonth() + 1, 1);
  firstDue.setMonth(firstDue.getMonth() + dueMonths + advanceMonths);
  return firstDue.toISOString().split('T')[0];
}

function generateScholarNumber(cls, sessionId) {
  const sess = sessions.find(s => s.id === sessionId);
  const yy = sess ? String(sess.startYear).slice(-2) : String(new Date().getFullYear()).slice(-2);
  const existing = students
    .filter(s => s.class === cls && s.session === sessionId && s.scholarNo && s.scholarNo.length >= 6)
    .map(s => parseInt(String(s.scholarNo).slice(2)) || 0);
  const serial = existing.length ? Math.max(...existing) + 1 : 1;
  return yy + String(serial).padStart(4, '0');
}

// ─── ATTENDANCE HELPERS ─────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }
function currentMonth() { return new Date().toISOString().slice(0, 7); }

function markAttendanceRecord(studentId, status) {
  const month = currentMonth();
  const key = studentId + '_' + month;
  if (!attendance[key]) attendance[key] = {};
  attendance[key][todayStr()] = status;
  saveAll();
}

function getAttendancePercent(studentId) {
  const month = currentMonth();
  const key = studentId + '_' + month;
  const rec = attendance[key] || {};
  const days = Object.values(rec);
  if (!days.length) return 100;
  return Math.round((days.filter(d => d === 'Present').length / days.length) * 100);
}

// ─── NAVIGATION ─────────────────────────────────────────────────
function showPage(pageId) {
  closePrintWindow();
  
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(n => {
    if (n.getAttribute('onclick') && n.getAttribute('onclick').includes(`'${pageId}'`)) {
      n.classList.add('active');
    }
  });
  
  document.getElementById('page-title').textContent = pageId.charAt(0).toUpperCase() + pageId.slice(1);
  
  switch(pageId) {
    case 'dashboard': renderDashboard(); break;
    case 'students': renderStudents(); break;
    case 'fees': renderFeeCollection(); break;
    case 'records': renderRecords(); break;
    case 'reminders': renderReminders(); break;
    case 'receipt': renderReceiptPage(); break;
    case 'reports': renderReports(); break;
    case 'ledger': renderLedger(); break;
    case 'attendance': renderAttendance(); break;
    case 'backup': renderBackupPage(); break;
    case 'sessions': renderSessionsPage(); break;
    case 'settings': renderSettingsPage(); break;
  }
}

// ─── SESSION MANAGEMENT ─────────────────────────────────────────
function refreshSessionSelector() {
  const sel = document.getElementById('active-session-select');
  if (!sel) return;
  sel.innerHTML = sessions.map(s => 
    `<option value="${s.id}" ${s.id === activeSession ? 'selected' : ''}>${s.id}</option>`
  ).join('');
  if (!activeSession && sessions.length > 0) {
    activeSession = sessions[0].id;
    saveAll();
    sel.value = activeSession;
  }
}

function switchActiveSession() {
  const sel = document.getElementById('active-session-select');
  if (sel) {
    activeSession = sel.value;
    saveAll();
    showPage('dashboard');
  }
}

// ═══════════════════════════════════════════════════════════════
// PRINT FUNCTIONALITY (FIXED - Opens in window, then print)
// ═══════════════════════════════════════════════════════════════

function openPrintWindow(title, contentHTML) {
  const printWindow = document.getElementById('print-window');
  
  printWindow.innerHTML = `
    <div class="print-window-overlay" id="print-overlay" onclick="if(event.target===this)closePrintWindow()">
      <div class="print-window-content">
        <div class="print-window-header no-print">
          <h3>🖨️ ${title}</h3>
          <div>
            <button class="btn btn-primary btn-sm" onclick="executePrint()">🖨️ Print</button>
            <button class="btn btn-outline btn-sm" onclick="closePrintWindow()">✕ Close</button>
          </div>
        </div>
        <div class="print-window-body" id="print-content-area">
          ${contentHTML}
        </div>
      </div>
    </div>
  `;
  
  printWindow.style.display = 'block';
  
  // Scroll to top of print window
  printWindow.scrollIntoView({ behavior: 'smooth' });
}

function closePrintWindow() {
  const printWindow = document.getElementById('print-window');
  printWindow.innerHTML = '';
  printWindow.style.display = 'none';
}

function executePrint() {
  // Hide the header buttons before printing
  const header = document.querySelector('.print-window-header');
  if (header) header.style.display = 'none';
  
  setTimeout(() => {
    window.print();
    
    // Show header again after printing
    setTimeout(() => {
      if (header) header.style.display = '';
    }, 500);
  }, 300);
}

function saveStudent() {
  const editId = document.getElementById('edit-student-id').value;
  const name = document.getElementById('s-name').value.trim();
  const fee = parseFloat(document.getElementById('s-fee').value) || 0;
  const joining = document.getElementById('s-joining').value;
  
  if (!name || !fee || !joining) { alert('Please fill Name, Monthly Fee, and Joining Date.'); return; }
  
  const cls = document.getElementById('s-class').value;
  const sessionVal = document.getElementById('s-session').value;
  
  const studentObj = {
    id: editId || 's' + nextStudentId,
    scholarNo: editId ? (students.find(s => s.id === editId)?.scholarNo || generateScholarNumber(cls, sessionVal)) : generateScholarNumber(cls, sessionVal),
    name, father: document.getElementById('s-father').value.trim(),
    class: cls, session: sessionVal, monthlyFee: fee,
    discount: parseFloat(document.getElementById('s-discount').value) || 0,
    email: document.getElementById('s-email').value.trim(),
    wa: document.getElementById('s-wa').value.trim(),
    joining, previousDue: editId ? (students.find(s => s.id === editId)?.previousDue || 0) : 0,
  };
  
  if (editId) { const idx = students.findIndex(s => s.id === editId); if (idx >= 0) students[idx] = studentObj; }
  else { students.push(studentObj); nextStudentId++; }
  
  saveAll(); closeStudentForm(); showPage('students');
}

function editStudentForm(studentId) { openStudentForm(studentId); }

function deleteStudentConfirm(studentId) {
  if (confirm('Delete this student? All payment records will be removed.')) {

    saveAll(); showPage('students');

}

function updateFeePreview() {
  const studentId = document.getElementById('fee-student').value;
  const student = students.find(s => s.id === studentId);

  if (!student) { preview.innerHTML = '<p style="color:var(--muted);">Select a student.</p>'; return; }
  const due = getTotalDue(student);
  preview.innerHTML = `<strong>Monthly Fee:</strong> ₹${student.monthlyFee} | <strong>Due:</strong> ₹${due} | <strong>Advance:</strong> ₹${getAdvanceBalance(student)}`;
  if (!document.getElementById('fee-amount').value) document.getElementById('fee-amount').value = due > 0 ? Math.min(due, student.monthlyFee) : student.monthlyFee;
}

function recordPayment() {
  const studentId = document.getElementById('fee-student').value;
  const amount = parseFloat(document.getElementById('fee-amount').value) || 0;
  const date = document.getElementById('fee-date').value;
  const month = document.getElementById('fee-month').value;
  if (!studentId || !amount || !date || !month) { alert('Fill all required fields.'); return null; }
  const payment = { receiptId: nextReceiptId++, studentId, amount, date, month, mode: document.getElementById('fee-mode').value, note: document.getElementById('fee-note').value };
  payments.push(payment); saveAll();
  alert(`✅ Payment recorded! Receipt #${payment.receiptId}`);
  document.getElementById('fee-amount').value = ''; updateFeePreview();
  return payment;
}

function recordAndPrintReceipt() {
  const payment = recordPayment();
  if (!payment) return;
  printReceiptContent(payment.receiptId);
}

function sendWAReminder(studentId) {
  const student = students.find(s => s.id === studentId);
  if (!student?.wa) { alert('No WhatsApp number.'); return; }
  const due = getTotalDue(student);
  window.open(`https://wa.me/91${student.wa.replace(/\D/g,'')}?text=${encodeURIComponent(`Dear Parent,\n\nReminder from Providence Tutorials\n₹${due.toLocaleString('en-IN')} pending for ${student.name} (${student.class}).\n\nPlease pay by 10th.\nThank you!`)}`, '_blank');

function sendEmailReminder(studentId) {
  const student = students.find(s => s.id === studentId);
  if (!student?.email) { alert('No email.'); return; }
  window.location.href = `mailto:${student.email}?subject=Fee Reminder&body=Dear Parent, ₹${getTotalDue(student)} pending for ${student.name}.`;
}

function sendAllReminders() {
  const dueStudents = getActiveStudents().filter(s => getTotalDue(s) > 0 && s.wa);
  if (!dueStudents.length) { alert('No students with WhatsApp numbers.'); return; }
  if (confirm(`Send to ${dueStudents.length} students?`)) dueStudents.forEach((s, i) => setTimeout(() => sendWAReminder(s.id), i * 500));
}

// ─── REPORTS ────────────────────────────────────────────────────
function renderReports() {
  const activeStudents = getActiveStudents();
  const activePayments = getActivePayments();
  const classWise = {};
  activeStudents.forEach(s => {
    if (!classWise[s.class]) classWise[s.class] = { students: 0, collected: 0, due: 0 };
    classWise[s.class].students++; classWise[s.class].collected += getDeposited(s.id); classWise[s.class].due += getTotalDue(s);
  });
  const totalCollected = activePayments.reduce((sum, p) => sum + p.amount, 0);
  const totalDue = activeStudents.reduce((sum, s) => sum + getTotalDue(s), 0);
  
  document.getElementById('content-area').innerHTML = `
    <div class="cards-row">
      <div class="stat-card green"><div class="stat-label">Collected</div><div class="stat-value">₹${totalCollected.toLocaleString('en-IN')}</div></div>
      <div class="stat-card red"><div class="stat-label">Due</div><div class="stat-value">₹${totalDue.toLocaleString('en-IN')}</div></div>
      <div class="stat-card blue"><div class="stat-label">Collection %</div><div class="stat-value">${totalCollected + totalDue > 0 ? Math.round((totalCollected / (totalCollected + totalDue)) * 100) : 0}%</div></div>
    </div>
    <div class="panel"><div class="panel-head"><h3>📋 Class-wise Report</h3></div>
      <div class="panel-body" style="padding:0;"><table><thead><tr><th>Class</th><th>Students</th><th>Collected</th><th>Due</th><th>%</th></tr></thead>
        <tbody>${Object.entries(classWise).sort().map(([cls, data]) => `<tr><td><strong>${cls}</strong></td><td>${data.students}</td><td>₹${data.collected.toLocaleString('en-IN')}</td><td>₹${data.due.toLocaleString('en-IN')}</td><td>${data.collected + data.due > 0 ? Math.round((data.collected / (data.collected + data.due)) * 100) : 0}%</td></tr>`).join('')}</tbody></table></div></div>
    <button class="btn btn-primary" onclick="printReport()">🖨️ Print Report</button>`;
}

function printReport() {
  const activeStudents = getActiveStudents();
  const activePayments = getActivePayments();
  const classWise = {};
  activeStudents.forEach(s => {
    if (!classWise[s.class]) classWise[s.class] = { students: 0, collected: 0, due: 0 };
    classWise[s.class].students++; classWise[s.class].collected += getDeposited(s.id); classWise[s.class].due += getTotalDue(s);
  });
  const totalCollected = activePayments.reduce((sum, p) => sum + p.amount, 0);
  const totalDue = activeStudents.reduce((sum, s) => sum + getTotalDue(s), 0);
  
  const contentHTML = `
    <div style="font-family:'DM Sans',sans-serif;">
      <h2 style="text-align:center;">Providence Tutorials - Fee Report</h2>
      <p style="text-align:center;">Session: ${activeSession} | Generated: ${new Date().toLocaleDateString('en-IN')}</p>
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin:20px 0; text-align:center;">
        <div><strong>Collected:</strong> ₹${totalCollected.toLocaleString('en-IN')}</div>
        <div><strong>Due:</strong> ₹${totalDue.toLocaleString('en-IN')}</div>
        <div><strong>%:</strong> ${totalCollected + totalDue > 0 ? Math.round((totalCollected / (totalCollected + totalDue)) * 100) : 0}%</div>
      </div>
      <table border="1" style="width:100%; border-collapse:collapse;"><thead><tr><th>Class</th><th>Students</th><th>Collected</th><th>Due</th><th>%</th></tr></thead>
        <tbody>${Object.entries(classWise).sort().map(([cls, data]) => `<tr><td>${cls}</td><td>${data.students}</td><td>₹${data.collected.toLocaleString('en-IN')}</td><td>₹${data.due.toLocaleString('en-IN')}</td><td>${data.collected + data.due > 0 ? Math.round((data.collected / (data.collected + data.due)) * 100) : 0}%</td></tr>`).join('')}</tbody></table>
    </div>`;
  
  openPrintWindow('Fee Report', contentHTML);
}

// ─── LEDGER ─────────────────────────────────────────────────────
function openLedgerForStudent(studentId) {
  showPage('ledger');
  setTimeout(() => { const sel = document.getElementById('ledger-student-select'); if (sel) { sel.value = studentId; showLedgerDetail(studentId); } }, 200);
}

function renderLedger() {
  document.getElementById('content-area').innerHTML = `
    <div class="panel"><div class="panel-head"><h3>📘 Fee Ledger</h3></div>
      <div class="panel-body">
        <select id="ledger-student-select" onchange="showLedgerDetail(this.value)" style="width:100%; margin-bottom:20px;"><option value="">— Select Student —</option>${getActiveStudents().map(s => `<option value="${s.id}">${s.name} (${s.class})</option>`).join('')}</select>
        <div id="ledger-detail"><p style="text-align:center; color:var(--muted);">Select a student to view ledger.</p></div>
        <button class="btn btn-primary" id="print-ledger-btn" onclick="printLedger()" disabled>🖨️ Print Ledger</button>
      </div></div>`;
}

function showLedgerDetail(studentId) {
  if (!studentId) { document.getElementById('ledger-detail').innerHTML = '<p style="text-align:center;">Select a student.</p>'; document.getElementById('print-ledger-btn').disabled = true; return; }
  const student = students.find(s => s.id === studentId);
  if (!student) return;
  const studentPayments = payments.filter(p => p.studentId === student.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  const due = getTotalDue(student);
  document.getElementById('ledger-detail').innerHTML = `
    <div style="background:#f9f6ef; padding:15px; border-radius:8px; margin-bottom:15px;">
      <h3>${student.name}</h3>
      <p>Scholar: ${student.scholarNo} | Class: ${student.class} | Fee: ₹${student.monthlyFee} | Due: ₹${due}</p>
    </div>
    <table><thead><tr><th>Date</th><th>Receipt#</th><th>Month</th><th>Amount</th><th>Mode</th></tr></thead>
      <tbody>${studentPayments.map(p => `<tr><td>${p.date}</td><td>#${p.receiptId}</td><td>${p.month}</td><td>₹${p.amount}</td><td>${p.mode}</td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;">No payments yet</td></tr>'}</tbody></table>`;
  document.getElementById('print-ledger-btn').disabled = false;
  document.getElementById('ledger-detail').setAttribute('data-student-id', studentId);
}

function printLedger() {
  const studentId = document.getElementById('ledger-detail')?.getAttribute('data-student-id');
  if (!studentId) return;
  const student = students.find(s => s.id === studentId);
  if (!student) return;
  const studentPayments = payments.filter(p => p.studentId === student.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  
  const contentHTML = `
    <div style="font-family:'DM Sans',sans-serif;">
      <h2 style="text-align:center;">Fee Ledger</h2>
      <p><strong>Student:</strong> ${student.name} | <strong>Scholar:</strong> ${student.scholarNo} | <strong>Class:</strong> ${student.class}</p>
      <table border="1" style="width:100%; border-collapse:collapse;"><thead><tr><th>Date</th><th>Receipt#</th><th>Month</th><th>Amount</th></tr></thead>
        <tbody>${studentPayments.map(p => `<tr><td>${p.date}</td><td>#${p.receiptId}</td><td>${p.month}</td><td>₹${p.amount}</td></tr>`).join('')}</tbody></table>
      <p><strong>Total Deposited:</strong> ₹${getDeposited(student.id).toLocaleString('en-IN')} | <strong>Due:</strong> ₹${getTotalDue(student).toLocaleString('en-IN')}</p>
    </div>`;
  
  openPrintWindow('Student Ledger', contentHTML);
}

// ─── ATTENDANCE ─────────────────────────────────────────────────
function renderAttendance() {
  const activeStudents = getActiveStudents();
  document.getElementById('content-area').innerHTML = `
    <div class="panel"><div class="panel-head"><h3>📅 Attendance - ${new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' })}</h3><button class="btn btn-primary btn-sm" onclick="markAllPresent()">✅ Mark All Present</button></div>
      <div class="panel-body" style="padding:0;"><table><thead><tr><th>Student</th><th>Class</th><th>Today</th><th>Month %</th><th>Status</th></tr></thead>
        <tbody>${activeStudents.map(s => { const todayAtt = (attendance[s.id + '_' + currentMonth()] || {})[todayStr()] || null; const attPct = getAttendancePercent(s.id); return `<tr><td><strong>${s.name}</strong></td><td>${s.class}</td><td><button class="btn btn-sm ${todayAtt === 'Present' ? 'btn-green' : 'btn-outline'}" onclick="markAttendanceRecord('${s.id}','Present');renderAttendance();">P</button> <button class="btn btn-sm ${todayAtt === 'Absent' ? 'btn-red' : 'btn-outline'}" onclick="markAttendanceRecord('${s.id}','Absent');renderAttendance();">A</button></td><td><div class="progress-bar"><div class="progress-fill ${attPct >= 75 ? 'good' : attPct >= 50 ? 'warning' : 'danger'}" style="width:${attPct}%;"></div></div> ${attPct}%</td><td>${attPct < 75 ? '<span class="badge badge-red">⚠️ Low</span>' : '<span class="badge badge-green">✅ Good</span>'}</td></tr>`; }).join('')}</tbody></table></div></div>`;
}

function markAllPresent() {
  if (confirm('Mark ALL students present today?')) { getActiveStudents().forEach(s => markAttendanceRecord(s.id, 'Present')); renderAttendance(); }
}

// ─── BACKUP ─────────────────────────────────────────────────────
function renderBackupPage() {
  document.getElementById('content-area').innerHTML = `
    <div class="cards-row" style="grid-template-columns:1fr 1fr;">
      <div class="panel"><div class="panel-head"><h3>💾 Export Backup</h3></div><div class="panel-body"><p>Students: ${students.length} | Payments: ${payments.length}</p><button class="btn btn-primary" onclick="exportBackup()">⬇️ Download Backup</button></div></div>
      <div class="panel"><div class="panel-head"><h3>📂 Restore</h3></div><div class="panel-body"><p style="color:var(--red);">⚠️ Overwrites all data</p><input type="file" id="restore-file" accept=".json" style="margin:10px 0; display:block;"><button class="btn btn-red" onclick="importBackup()">📂 Restore</button></div></div></div>`;
}

function exportBackup() {
  const data = { version: 3, exportedAt: new Date().toISOString(), students, payments, sessions, activeSession, attendance, nextStudentId, nextReceiptId };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `providence_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href);
  alert('✅ Backup downloaded!');
}

function importBackup() {
  const file = document.getElementById('restore-file')?.files[0];
  if (!file) { alert('Select a file.'); return; }
  if (!confirm('⚠️ Replace ALL data?')) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      students = data.students || []; payments = data.payments || []; sessions = data.sessions || [];
      activeSession = data.activeSession || ''; attendance = data.attendance || {};
      nextStudentId = data.nextStudentId || 1; nextReceiptId = data.nextReceiptId || 1001;
      saveAll(); refreshSessionSelector(); alert('✅ Restored!'); showPage('dashboard');
    } catch (err) { alert('❌ Invalid file.'); }
  };
  reader.readAsText(file);
}

// ─── SESSIONS ───────────────────────────────────────────────────
function renderSessionsPage() {
  document.getElementById('content-area').innerHTML = `
    <div class="panel"><div class="panel-head"><h3>📆 Sessions</h3><button class="btn btn-primary btn-sm" onclick="createNewSession()">+ New Session</button></div>
      <div class="panel-body">${sessions.map(s => { const count = students.filter(st => st.session === s.id).length; return `<div style="display:flex; justify-content:space-between; padding:15px; background:#f9f6ef; border-radius:8px; margin-bottom:10px;"><div><strong>${s.id}</strong> | ${count} students ${s.id === activeSession ? '<span class="badge badge-green">Active</span>' : ''}</div><div>${s.id !== activeSession ? `<button class="btn btn-primary btn-sm" onclick="setActive('${s.id}')">Set Active</button> ` : ''}<button class="btn btn-red btn-sm" onclick="deleteSession('${s.id}')">🗑️</button></div></div>`; }).join('') || '<p>No sessions.</p>'}</div></div>`;
}

function createNewSession() {
  const sy = prompt('Start year:'); const ey = prompt('End year:');
  if (!sy || !ey) return;
  const id = sy + '-' + ey.slice(-2);
  if (sessions.find(s => s.id === id)) { alert('Session exists.'); return; }
  sessions.push({ id, startYear: parseInt(sy), endYear: parseInt(ey), created: new Date().toISOString() });
  if (!activeSession) activeSession = id;
  saveAll(); refreshSessionSelector(); renderSessionsPage();
}

function setActive(sid) { activeSession = sid; saveAll(); refreshSessionSelector(); showPage('dashboard'); }

function deleteSession(sid) {
  if (sid === activeSession) { alert('Cannot delete active session.'); return; }
  if (confirm(`Delete ${sid}?`)) { sessions = sessions.filter(s => s.id !== sid); students = students.filter(s => s.session !== sid); saveAll(); refreshSessionSelector(); renderSessionsPage(); }
}

// ─── SETTINGS ───────────────────────────────────────────────────
function renderSettingsPage() {
  const users = JSON.parse(localStorage.getItem('pt_users') || '[]');
  document.getElementById('content-area').innerHTML = `
    <div class="panel"><div class="panel-head"><h3>⚙️ Settings</h3></div><div class="panel-body"><h4>Users</h4><table><thead><tr><th>User ID</th><th>Role</th></tr></thead><tbody>${users.map(u => `<tr><td>${u.uid}</td><td>${u.role}</td></tr>`).join('')}</tbody></table><h4 style="margin-top:20px;">Change Password</h4><div class="form-grid"><div class="form-group"><label>Current</label><input type="password" id="cp-old"></div><div class="form-group"><label>New</label><input type="password" id="cp-new"></div></div><button class="btn btn-gold" onclick="changePassword()">Update Password</button></div></div>`;
}

function changePassword() {
  const oldPw = document.getElementById('cp-old')?.value;
  const newPw = document.getElementById('cp-new')?.value;
  if (!oldPw || !newPw || newPw.length < 6) { alert('Fill both fields (min 6 chars).'); return; }
  const users = JSON.parse(localStorage.getItem('pt_users') || '[]');
  const currentUser = JSON.parse(localStorage.getItem('pt_session') || '{}');
  const idx = users.findIndex(u => u.uid === currentUser.uid);
  if (idx >= 0) {
    if (users[idx].password !== btoa(oldPw)) { alert('Incorrect current password.'); return; }
    users[idx].password = btoa(newPw); localStorage.setItem('pt_users', JSON.stringify(users));
    alert('✅ Password updated! Login again.'); doLogout();
  }
}

function doLogout() { localStorage.removeItem('pt_session'); window.location.href = 'index.html'; }

// ─── INIT ───────────────────────────────────────────────────────
(function init() {
  const session = JSON.parse(localStorage.getItem('pt_session') || 'null');
  if (!session) { window.location.href = 'index.html'; return; }
  if (Date.now() - (session.loginTime || 0) > 8 * 60 * 60 * 1000) { localStorage.removeItem('pt_session'); window.location.href = 'index.html'; return; }
  document.getElementById('topbar-user').textContent = session.name || session.uid || 'Admin';
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  migrateData(); refreshSessionSelector(); showPage('dashboard');
  console.log('✅ Providence ERP Ready - Print functionality fixed!');
})();
</script>
