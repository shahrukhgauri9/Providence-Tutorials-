<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Providence Tutorials – Complete ERP</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
  
  :root {
    --navy: #0f2044;
    --gold: #c9a84c;
    --gold-light: #f0d98a;
    --cream: #fdf8f0;
    --green: #1a7a4a;
    --red: #c0392b;
    --blue: #1a5276;
    --sidebar-w: 240px;
    --card: #ffffff;
    --border: #e8e0d0;
    --text: #1a1a2e;
    --muted: #7a7a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }

  #sidebar {
    width: var(--sidebar-w);
    background: var(--navy);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    overflow-y: auto;
  }

  .logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(201, 168, 76, .25);
  }

  .logo h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 17px;
    line-height: 1.3;
  }

  .logo p {
    color: rgba(255, 255, 255, .5);
    font-size: 11px;
    margin-top: 2px;
  }

  nav { flex: 1; padding: 16px 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: rgba(255, 255, 255, .65);
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    transition: all .2s;
    border-left: 3px solid transparent;
  }

  .nav-item:hover { color: #fff; background: rgba(255,255,255,.06); }
  
  .nav-item.active {
    color: var(--gold);
    border-left-color: var(--gold);
    background: rgba(201, 168, 76, .1);
  }

  .nav-item .icon { font-size: 16px; width: 18px; text-align: center; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255, 255, 255, .1);
    color: rgba(255,255,255,.4);
    font-size: 11px;
  }

  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
    flex-wrap: wrap;
    gap: 10px;
  }

  .topbar h2 { font-size: 18px; font-weight: 600; color: var(--navy); }
  .topbar-date { font-size: 12px; color: var(--muted); }

  .session-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fdf8f0;
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 6px 14px;
  }

  .session-selector label {
    font-size: 11px;
    font-weight: 700;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: .4px;
    white-space: nowrap;
  }

  .session-selector select {
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    padding: 2px 4px;
  }

  .content { padding: 28px; }
  .page { display: none; }
  .page.active { display: block; }

  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .stat-card.blue::before { background: var(--blue); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.gold::before { background: var(--gold); }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--navy);
    margin-top: 8px;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .panel-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fafaf8;
  }

  .panel-head h3 { font-size: 14px; font-weight: 600; color: var(--navy); }
  .panel-body { padding: 20px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-group.full { grid-column: 1/-1; }

  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  input, select, textarea {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: #fff;
    transition: border .2s;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,.12);
  }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 2px;
  }

  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary:hover { background: #162d5a; }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: #b8943e; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { background: #145e38; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover { background: #a93226; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--navy); color: var(--navy); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--muted);
    background: #fafaf8;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 11px 14px;
    border-bottom: 1px solid #f0ece4;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdf9f2; }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    margin: 2px;
  }

  .badge-green { background: #d4edda; color: #155724; }
  .badge-red { background: #f8d7da; color: #721c24; }
  .badge-yellow { background: #fff3cd; color: #856404; }
  .badge-blue { background: #cce5ff; color: #004085; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,32,68,.55);
    backdrop-filter: blur(3px);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 14px;
    width: 90%;
    max-width: 650px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h3 { font-size: 16px; font-weight: 600; color: var(--navy); }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
  .modal-body { padding: 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .id-card {
    width: 350px;
    border: 3px solid var(--navy);
    border-radius: 15px;
    padding: 20px;
    background: linear-gradient(135deg, #fff 0%, #fdf8f0 100%);
    margin: 20px auto;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
  }

  .id-card-header {
    background: var(--navy);
    color: var(--gold);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
  }

  .id-card-photo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    object-fit: cover;
    margin: 10px auto;
    background: #eee;
  }

  .overdue-row { background: #fff5f5 !important; }
  .overdue-badge { animation: pulse 2s infinite; }

  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px;
    }
    .no-print { display: none !important; }
  }

  @media (max-width: 768px) {
    #sidebar { width: 60px; }
    #main { margin-left: 60px; }
    .nav-item span:not(.icon) { display: none; }
    .logo h1, .logo p { display: none; }
    .cards-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <h1>Providence<br>Tutorials</h1>
    <p>Complete ERP System</p>
  </div>
  <nav>
    <div class="nav-item active" onclick="showPage('dashboard')"><span class="icon">📊</span> <span>Dashboard</span></div>
    <div class="nav-item" onclick="showPage('students')"><span class="icon">👨‍🎓</span> <span>Students</span></div>
    <div class="nav-item" onclick="showPage('fees')"><span class="icon">💰</span> <span>Collect Fee</span></div>
    <div class="nav-item" onclick="showPage('records')"><span class="icon">🗂️</span> <span>Fee Records</span></div>
    <div class="nav-item" onclick="showPage('reminders')"><span class="icon">📲</span> <span>Reminders</span></div>
    <div class="nav-item" onclick="showPage('receipt')"><span class="icon">🖨️</span> <span>Receipt</span></div>
    <div class="nav-item" onclick="showPage('reports')"><span class="icon">📋</span> <span>Reports</span></div>
    <div class="nav-item" onclick="showPage('ledger')"><span class="icon">📘</span> <span>Ledger</span></div>
    <div class="nav-item" onclick="showPage('attendance')"><span class="icon">📅</span> <span>Attendance</span></div>
    <div class="nav-item" onclick="showPage('backup')"><span class="icon">💾</span> <span>Backup</span></div>
    <div class="nav-item" onclick="showPage('sessions')"><span class="icon">📆</span> <span>Sessions</span></div>
    <div class="nav-item" onclick="showPage('settings')"><span class="icon">⚙️</span> <span>Settings</span></div>
  </nav>
  <div class="sidebar-footer">© 2025 Providence Tutorials</div>
</div>

<!-- MAIN CONTENT -->
<div id="main">
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
      <h2 id="page-title">Dashboard</h2>
      <div class="session-selector">
        <label>📅 Session:</label>
        <select id="active-session-select" onchange="switchActiveSession()"></select>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <span class="topbar-date" id="today-date"></span>
      <span style="font-weight:600;" id="topbar-user">Admin</span>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>

  <div class="content" id="content-area">
    <!-- Pages will be dynamically rendered here -->
  </div>
</div>

<!-- MODALS CONTAINER -->
<div id="modals-container"></div>

<!-- PRINT AREA -->
<div id="print-area" style="display:none;"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// COMPLETE JAVASCRIPT - ALL FEATURES IMPLEMENTED
// ═══════════════════════════════════════════════════════════════

// ─── DATA LAYER ─────────────────────────────────────────────────
let students = JSON.parse(localStorage.getItem('pt_students') || '[]');
let payments = JSON.parse(localStorage.getItem('pt_payments') || '[]');
let sessions = JSON.parse(localStorage.getItem('pt_sessions') || '[]');
let activeSession = localStorage.getItem('pt_activeSession') || '';
let nextStudentId = parseInt(localStorage.getItem('pt_sid') || '1');
let nextReceiptId = parseInt(localStorage.getItem('pt_rid') || '1001');
// NEW FEATURE: Attendance & Promotion Logs
let attendance = JSON.parse(localStorage.getItem('pt_attendance') || '{}');
let promotionLog = JSON.parse(localStorage.getItem('pt_promotionLog') || '[]');

function saveAll() {
  localStorage.setItem('pt_students', JSON.stringify(students));
  localStorage.setItem('pt_payments', JSON.stringify(payments));
  localStorage.setItem('pt_sessions', JSON.stringify(sessions));
  localStorage.setItem('pt_activeSession', activeSession);
  localStorage.setItem('pt_sid', nextStudentId);
  localStorage.setItem('pt_rid', nextReceiptId);
  localStorage.setItem('pt_attendance', JSON.stringify(attendance));
  localStorage.setItem('pt_promotionLog', JSON.stringify(promotionLog));
}

// ─── MIGRATION ──────────────────────────────────────────────────
function migrateData() {
  if (!sessions.length) {
    const now = new Date();
    const yr = now.getFullYear();
    const month = now.getMonth();
    const startYr = month < 3 ? yr - 1 : yr;
    sessions.push({
      id: startYr + '-' + String(startYr + 1).slice(-2),
      startYear: startYr,
      endYear: startYr + 1,
      created: new Date().toISOString()
    });
    activeSession = sessions[0].id;
  }
  students.forEach(s => {
    if (!s.session) s.session = activeSession || sessions[0]?.id || '2025-26';
    if (!s.previousDue) s.previousDue = 0;
    if (!s.discount) s.discount = 0;
    if (!s.email) s.email = '';
    if (!s.photo) s.photo = '';
    if (!s.scholarNo) s.scholarNo = generateScholarNumber(s.class, s.session);
  });
  saveAll();
}

// ─── HELPER FUNCTIONS ───────────────────────────────────────────
function getActiveStudents() {
  return activeSession ? students.filter(s => s.session === activeSession) : students;
}

function getActivePayments() {
  const ids = new Set(getActiveStudents().map(s => s.id));
  return payments.filter(p => ids.has(p.studentId));
}

function getDeposited(studentId) {
  return payments.filter(p => p.studentId === studentId).reduce((sum, p) => sum + p.amount, 0);
}

function getDueMonths(student) {
  const joining = new Date(student.joining);
  const now = new Date();
  const firstDue = new Date(joining.getFullYear(), joining.getMonth() + 1, 1);
  if (firstDue > now) return 0;
  return Math.max(0, (now.getFullYear() - firstDue.getFullYear()) * 12 + (now.getMonth() - firstDue.getMonth()) + 1);
}

function getTotalDue(student) {
  const gross = getDueMonths(student) * student.monthlyFee;
  const deposited = getDeposited(student.id);
  const raw = gross - deposited + (student.previousDue || 0) - (student.discount || 0);
  return Math.max(0, raw);
}

function getAdvanceBalance(student) {
  const gross = getDueMonths(student) * student.monthlyFee;
  const deposited = getDeposited(student.id);
  const raw = gross - deposited + (student.previousDue || 0) - (student.discount || 0);
  return raw < 0 ? Math.abs(raw) : 0;
}

// NEW FEATURE: Overdue check (due date = 10th)
function isOverdue(student) {
  const today = new Date();
  return today.getDate() > 10 && getTotalDue(student) > 0;
}

function getNextPaymentDate(student) {
  const joining = new Date(student.joining);
  const dueMonths = getDueMonths(student);
  const advanceMonths = Math.floor(getAdvanceBalance(student) / student.monthlyFee);
  const firstDue = new Date(joining.getFullYear(), joining.getMonth() + 1, 1);
  firstDue.setMonth(firstDue.getMonth() + dueMonths + advanceMonths);
  return firstDue.toISOString().split('T')[0];
}

function generateScholarNumber(cls, sessionId) {
  const sess = sessions.find(s => s.id === sessionId);
  const yy = sess ? String(sess.startYear).slice(-2) : String(new Date().getFullYear()).slice(-2);
  const existing = students
    .filter(s => s.class === cls && s.session === sessionId && s.scholarNo && s.scholarNo.length >= 6)
    .map(s => parseInt(String(s.scholarNo).slice(2)) || 0);
  const serial = existing.length ? Math.max(...existing) + 1 : 1;
  return yy + String(serial).padStart(4, '0');
}

// ─── ATTENDANCE HELPERS (NEW FEATURE) ──────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }

function currentMonth() { return new Date().toISOString().slice(0, 7); }

function getAttKey(studentId, month) { return `${studentId}_${month}`; }

function markAttendanceRecord(studentId, status) {
  const month = currentMonth();
  const key = getAttKey(studentId, month);
  if (!attendance[key]) attendance[key] = {};
  attendance[key][todayStr()] = status;
  saveAll();
}

function getAttendancePercent(studentId) {
  const month = currentMonth();
  const key = getAttKey(studentId, month);
  const rec = attendance[key] || {};
  const days = Object.values(rec);
  if (!days.length) return 100;
  return Math.round((days.filter(d => d === 'Present').length / days.length) * 100);
}

function getTodayAttendance(studentId) {
  const month = currentMonth();
  const key = getAttKey(studentId, month);
  return (attendance[key] || {})[todayStr()] || null;
}

// ─── NAVIGATION ─────────────────────────────────────────────────
function showPage(pageId) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[onclick*="${pageId}"]`);
  if (navItem) navItem.classList.add('active');
  
  document.getElementById('page-title').textContent = pageId.charAt(0).toUpperCase() + pageId.slice(1);
  
  const contentArea = document.getElementById('content-area');
  
  switch(pageId) {
    case 'dashboard': renderDashboard(); break;
    case 'students': renderStudents(); break;
    case 'fees': renderFeeCollection(); break;
    case 'records': renderRecords(); break;
    case 'reminders': renderReminders(); break;
    case 'receipt': renderReceiptPage(); break;
    case 'reports': renderReports(); break;
    case 'ledger': renderLedger(); break;
    case 'attendance': renderAttendance(); break;
    case 'backup': renderBackupPage(); break;
    case 'sessions': renderSessionsPage(); break;
    case 'settings': renderSettingsPage(); break;
  }
}

// ─── SESSION MANAGEMENT ─────────────────────────────────────────
function refreshSessionSelector() {
  const sel = document.getElementById('active-session-select');
  if (!sel) return;
  sel.innerHTML = sessions.map(s => 
    `<option value="${s.id}" ${s.id === activeSession ? 'selected' : ''}>${s.id}</option>`
  ).join('');
  if (!activeSession && sessions.length > 0) {
    activeSession = sessions[0].id;
    saveAll();
    sel.value = activeSession;
  }
}

function switchActiveSession() {
  const sel = document.getElementById('active-session-select');
  if (sel) {
    activeSession = sel.value;
    saveAll();
    showPage('dashboard');
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER FUNCTIONS FOR EACH PAGE
// ═══════════════════════════════════════════════════════════════

// ─── DASHBOARD ──────────────────────────────────────────────────
function renderDashboard() {
  const activeStudents = getActiveStudents();
  const activePayments = getActivePayments();
  const totalCollected = activePayments.reduce((sum, p) => sum + p.amount, 0);
  const totalDue = activeStudents.reduce((sum, s) => sum + getTotalDue(s), 0);
  const dueCount = activeStudents.filter(s => getTotalDue(s) > 0).length;
  const overdueCount = activeStudents.filter(s => isOverdue(s)).length;
  
  document.getElementById('content-area').innerHTML = `
    <div class="cards-row">
      <div class="stat-card blue">
        <div class="stat-label">Total Students</div>
        <div class="stat-value">${activeStudents.length}</div>
        <div class="stat-sub">Active Session: ${activeSession}</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Total Collected</div>
        <div class="stat-value">₹${totalCollected.toLocaleString('en-IN')}</div>
        <div class="stat-sub">All payments</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Total Due</div>
        <div class="stat-value">₹${totalDue.toLocaleString('en-IN')}</div>
        <div class="stat-sub">${dueCount} students pending</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">Overdue</div>
        <div class="stat-value">${overdueCount}</div>
        <div class="stat-sub">Past 10th of month</div>
      </div>
    </div>
    
    <div class="panel">
      <div class="panel-head"><h3>🔴 Students with Pending Dues</h3></div>
      <div class="panel-body" style="padding:0;">
        <table>

function filterStudentsTable() {

    row.style.display = name.includes(query) ? '' : 'none';
  });

  `;

function handlePhotoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('s-photo-base64').value = e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveStudent() {
  const editId = document.getElementById('edit-student-id').value;
  const name = document.getElementById('s-name').value.trim();
  const fee = parseFloat(document.getElementById('s-fee').value) || 0;
  const joining = document.getElementById('s-joining').value;
  
  if (!name || !fee || !joining) {
    alert('Please fill Name, Monthly Fee, and Joining Date.');
    return;
  }
  
  const cls = document.getElementById('s-class').value;
  const session = document.getElementById('s-session').value;
  
  const studentObj = {
    id: editId || 's' + nextStudentId,
    scholarNo: editId ? (students.find(s => s.id === editId)?.scholarNo || generateScholarNumber(cls, session)) : generateScholarNumber(cls, session),
    name,
    father: document.getElementById('s-father').value.trim(),
    class: cls,
    session,
    monthlyFee: fee,
    discount: parseFloat(document.getElementById('s-discount').value) || 0,
    email: document.getElementById('s-email').value.trim(),
    wa: document.getElementById('s-wa').value.trim(),
    joining,
    photo: document.getElementById('s-photo-base64').value,
    previousDue: editId ? (students.find(s => s.id === editId)?.previousDue || 0) : 0,
  };
  
  if (editId) {
    const idx = students.findIndex(s => s.id === editId);
    if (idx >= 0) students[idx] = studentObj;
  } else {
    students.push(studentObj);
    nextStudentId++;
  }
  
  saveAll();
  closeModal('student-modal');
  showPage('students');
}

function editStudentForm(studentId) {
  openStudentForm(studentId);
}

function deleteStudentConfirm(studentId) {
  if (confirm('Delete this student? All payment records will be removed.')) {
    students = students.filter(s => s.id !== studentId);
    payments = payments.filter(p => p.studentId !== studentId);
    saveAll();
    showPage('students');
  }
}

function updateFeePreview() {
  const studentId = document.getElementById('fee-student').value;
  const student = students.find(s => s.id === studentId);
  const preview = document.getElementById('fee-preview');
  
  if (!student) {
    preview.innerHTML = '<p style="color:var(--muted);">Select a student to see fee details.</p>';
    return;
  }
  
  const due = getTotalDue(student);
  const advance = getAdvanceBalance(student);
  const nextDate = getNextPaymentDate(student);
  
  preview.innerHTML = `
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; text-align:center;">
      <div><strong>Monthly Fee</strong><br>₹${student.monthlyFee}</div>
      <div><strong>Discount</strong><br>₹${student.discount || 0}</div>
      <div><strong>Current Due</strong><br><span style="color:${due > 0 ? 'var(--red)' : 'var(--green)'}">₹${due}</span></div>
      <div><strong>Advance</strong><br><span style="color:var(--blue)">₹${advance}</span></div>
    </div>
    <p style="margin-top:10px;"><strong>Next Payment Due:</strong> ${nextDate}</p>
  `;
  
  if (!document.getElementById('fee-amount').value) {
    document.getElementById('fee-amount').value = due > 0 ? Math.min(due, student.monthlyFee) : student.monthlyFee;
  }
}

function recordPayment() {
  const studentId = document.getElementById('fee-student').value;
  const amount = parseFloat(document.getElementById('fee-amount').value) || 0;
  const date = document.getElementById('fee-date').value;
  const month = document.getElementById('fee-month').value;
  const mode = document.getElementById('fee-mode').value;
  const note = document.getElementById('fee-note').value;
  
  if (!studentId || !amount || !date || !month) {
    alert('Please fill all required fields.');
    return null;
  }
  
  const payment = {
    receiptId: nextReceiptId++,
    studentId,
    amount,
    date,
    month,
    mode,
    note
  };
  
  payments.push(payment);
  saveAll();
  
  const student = students.find(s => s.id === studentId);
  const advance = student ? getAdvanceBalance(student) : 0;
  
  alert(`✅ Payment recorded! Receipt #${payment.receiptId}\n${advance > 0 ? '📌 Advance balance: ₹' + advance.toLocaleString('en-IN') : ''}`);
  
  document.getElementById('fee-amount').value = '';
  updateFeePreview();
  return payment;
}

function recordAndPrintReceipt() {
  const payment = recordPayment();
  if (!payment) return;
  
  // Navigate to receipt page and select this payment
  showPage('receipt');
  setTimeout(() => {
    const receiptSelect = document.getElementById('receipt-select');
    if (receiptSelect) {
      receiptSelect.value = payment.receiptId;
      previewReceipt();
    }
    setTimeout(() => window.print(), 500);
  }, 300);
}

        <button class="btn btn-green btn-sm" onclick="sendAllReminders()">📲 Send All WhatsApp</button>
      </div>
      <div class="panel-body" style="padding:0;">
        <table>
          <thead><tr><th>Student</th><th>Class</th><th>Due Amount</th><th>Status</th><th>WhatsApp</th><th>Email</th></tr></thead>
          <tbody>
            ${dueStudents.map(s => `
              <tr class="${isOverdue(s) ? 'overdue-row' : ''}">
                <td><strong>${s.name}</strong></td>
                <td>${s.class}</td>
                <td><span class="badge badge-red">₹${getTotalDue(s).toLocaleString('en-IN')}</span></td>
                <td>${isOverdue(s) ? '<span class="badge badge-red overdue-badge">OVERDUE</span>' : '<span class="badge badge-yellow">Due</span>'}</td>
                <td>
                  ${s.wa ? `<button class="btn btn-sm btn-gold" onclick="sendWAReminder('${s.id}')">📲 Send</button>` : '<span style="color:var(--muted);">No number</span>'}
                </td>
                <td>
                  ${s.email ? `<button class="btn btn-sm btn-outline" onclick="sendEmailReminder('${s.id}')">📧 Send</button>` : '<span style="color:var(--muted);">No email</span>'}
                </td>
              </tr>
            `).join('') || '<tr><td colspan="6" style="text-align:center;padding:20px;">🎉 No pending dues!</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function sendWAReminder(studentId) {
  const student = students.find(s => s.id === studentId);
  if (!student?.wa) {
    alert('WhatsApp number not available.');
    return;
  }
  
  const due = getTotalDue(student);
  const message = `Dear Parent,\n\nThis is a reminder from *Providence Tutorials* that ₹${due.toLocaleString('en-IN')} is pending for ${student.name} (${student.class}).\n\nPlease pay by the 10th to avoid late fees.\n\nThank you! 🙏`;
  
  const waNumber = student.wa.replace(/\D/g, '');
  window.open(`https://wa.me/91${waNumber}?text=${encodeURIComponent(message)}`, '_blank');
}

// NEW FEATURE: Email reminder
function sendEmailReminder(studentId) {
  const student = students.find(s => s.id === studentId);
  if (!student?.email) {
    alert('Email address not available.');
    return;
  }
  
  const due = getTotalDue(student);
  const subject = `Fee Reminder - Providence Tutorials`;
  const body = `Dear Parent,\n\nThis is a reminder that ₹${due.toLocaleString('en-IN')} is pending for ${student.name} (${student.class}).\n\nPlease pay by the 10th of this month.\n\nThank you,\nProvidence Tutorials`;
  
  window.location.href = `mailto:${student.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function sendAllReminders() {
  const dueStudents = getActiveStudents().filter(s => getTotalDue(s) > 0 && s.wa);
  if (!dueStudents.length) {
    alert('No students with WhatsApp numbers have pending dues.');
    return;
  }
  
  if (confirm(`Send WhatsApp reminders to ${dueStudents.length} students?`)) {
    dueStudents.forEach((s, i) => {
      setTimeout(() => sendWAReminder(s.id), i * 500);
    });
  }
}

// ─── REPORTS (NEW FEATURE) ──────────────────────────────────────
function renderReports() {
  const activeStudents = getActiveStudents();
  const activePayments = getActivePayments();
  
  // Class-wise collection
  const classWise = {};
  activeStudents.forEach(s => {
    if (!classWise[s.class]) classWise[s.class] = { students: 0, collected: 0, due: 0 };
    classWise[s.class].students++;
    classWise[s.class].collected += getDeposited(s.id);
    classWise[s.class].due += getTotalDue(s);
  });
  
  const totalCollected = activePayments.reduce((sum, p) => sum + p.amount, 0);
  const totalDue = activeStudents.reduce((sum, s) => sum + getTotalDue(s), 0);
  
  document.getElementById('content-area').innerHTML = `
    <div class="cards-row">
      <div class="stat-card green">
        <div class="stat-label">Total Collected</div>
        <div class="stat-value">₹${totalCollected.toLocaleString('en-IN')}</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Total Due</div>
        <div class="stat-value">₹${totalDue.toLocaleString('en-IN')}</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Collection %</div>
        <div class="stat-value">${totalCollected + totalDue > 0 ? Math.round((totalCollected / (totalCollected + totalDue)) * 100) : 0}%</div>
      </div>
    </div>
    
    <div class="panel">
      <div class="panel-head"><h3>📋 Class-wise Report (${activeSession})</h3></div>
      <div class="panel-body" style="padding:0;">
        <table>
          <thead><tr><th>Class</th><th>Students</th><th>Collected</th><th>Due</th><th>Collection %</th></tr></thead>
          <tbody>
            ${Object.entries(classWise).map(([cls, data]) => `
              <tr>
                <td><strong>${cls}</strong></td>
                <td>${data.students}</td>
                <td>₹${data.collected.toLocaleString('en-IN')}</td>
                <td>₹${data.due.toLocaleString('en-IN')}</td>
                <td>${data.collected + data.due > 0 ? Math.round((data.collected / (data.collected + data.due)) * 100) : 0}%</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
    
    <button class="btn btn-primary" onclick="window.print()">🖨️ Print Report</button>
  `;
}

// ─── LEDGER (NEW FEATURE) ───────────────────────────────────────
function renderLedger() {
  const activeStudents = getActiveStudents();
  
  document.getElementById('content-area').innerHTML = `

      <div class="panel-head"><h3>📘 Student Fee Ledger</h3></div>
      <div class="panel-body">
        <div class="form-group" style="margin-bottom:20px;">
          <label>Select Student</label>
          <select id="ledger-student-select" onchange="showLedger(this.value)">
            <option value="">— Select Student —</option>

        </div>
        <div id="ledger-detail"></div>
        <button class="btn btn-primary no-print" onclick="window.print()" style="margin-top:16px;">🖨️ Print Ledger</button>

}

function showLedger(studentId) {
  if (typeof studentId === 'string' && studentId.includes('showLedger')) {
    // Called from student row
    return;
  }
  
  const selectEl = document.getElementById('ledger-student-select');
  if (selectEl && studentId) selectEl.value = studentId;
  
  const id = studentId || selectEl?.value;
  const student = students.find(s => s.id === id);
  const detailEl = document.getElementById('ledger-detail');
  
  if (!student || !detailEl) return;
  
  const studentPayments = payments.filter(p => p.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));
  const due = getTotalDue(student);
  const advance = getAdvanceBalance(student);
  
  detailEl.innerHTML = `
    <div style="background:#f9f6ef; padding:15px; border-radius:8px; margin-bottom:15px;">
      <h3>${student.name} - ${student.class}</h3>
      <p><strong>Scholar No:</strong> ${student.scholarNo || '—'} | <strong>Monthly Fee:</strong> ₹${student.monthlyFee} | <strong>Discount:</strong> ₹${student.discount || 0}</p>
      <p><strong>Current Due:</strong> <span style="color:${due > 0 ? 'var(--red)' : 'var(--green)'}">₹${due.toLocaleString('en-IN')}</span> | <strong>Advance:</strong> ₹${advance.toLocaleString('en-IN')}</p>
    </div>
    
    <table>
      <thead><tr><th>Date</th><th>Receipt#</th><th>Month</th><th>Amount</th><th>Mode</th></tr></thead>
      <tbody>
        ${studentPayments.map(p => `
          <tr>
            <td>${p.date}</td>
            <td>#${p.receiptId}</td>
            <td>${p.month}</td>
            <td><strong>₹${p.amount.toLocaleString('en-IN')}</strong></td>
            <td>${p.mode}</td>
          </tr>
        `).join('') || '<tr><td colspan="5" style="text-align:center;">No payments recorded</td></tr>'}
      </tbody>
    </table>
  `;
}

// ─── BACKUP PAGE ─────────────────────────────────────────────────
function renderBackupPage() {
  document.getElementById('content-area').innerHTML = `
    <div class="cards-row" style="grid-template-columns:1fr 1fr;">
      <div class="panel">
        <div class="panel-head"><h3>💾 Export Backup</h3></div>
        <div class="panel-body">
          <p>Download complete data as JSON file.</p>
          <p style="color:var(--muted);">Students: ${students.length} | Payments: ${payments.length}</p>
          <button class="btn btn-primary" onclick="exportBackup()">⬇️ Download Backup</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>📂 Restore Backup</h3></div>
        <div class="panel-body">
          <p style="color:var(--red);">⚠️ This will overwrite all current data.</p>
          <input type="file" id="restore-file" accept=".json" style="margin:10px 0; display:block;">
          <button class="btn btn-red" onclick="importBackup()">📂 Restore</button>
        </div>
      </div>
    </div>
  `;
}

function exportBackup() {
  const data = {
    version: 3,
    exportedAt: new Date().toISOString(),
    students,
    payments,
    sessions,
    activeSession,
    attendance,
    promotionLog,
    nextStudentId,
    nextReceiptId
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `providence_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  alert('✅ Backup downloaded!');
}

function importBackup() {
  const file = document.getElementById('restore-file')?.files[0];
  if (!file) { alert('Please select a file.'); return; }
  if (!confirm('⚠️ This will replace ALL data. Continue?')) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      students = data.students || [];
      payments = data.payments || [];
      sessions = data.sessions || [];
      activeSession = data.activeSession || '';
      attendance = data.attendance || {};
      promotionLog = data.promotionLog || [];
      nextStudentId = data.nextStudentId || 1;
      nextReceiptId = data.nextReceiptId || 1001;
      saveAll();
      refreshSessionSelector();
      alert('✅ Data restored successfully!');
      showPage('dashboard');
    } catch (err) {
      alert('❌ Invalid backup file.');
    }
  };
  reader.readAsText(file);
}

// ─── SESSIONS PAGE ───────────────────────────────────────────────
function renderSessionsPage() {
  document.getElementById('content-area').innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <h3>📆 Academic Sessions</h3>
        <button class="btn btn-primary btn-sm" onclick="createSession()">+ New Session</button>
      </div>
      <div class="panel-body">
        ${sessions.map(s => {
          const count = students.filter(st => st.session === s.id).length;
          return `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#f9f6ef; border-radius:8px; margin-bottom:10px;">
              <div>
                <strong>${s.id}</strong> | ${count} students | Created: ${new Date(s.created).toLocaleDateString('en-IN')}
                ${s.id === activeSession ? '<span class="badge badge-green">Active</span>' : ''}
              </div>
              <div>
                ${s.id !== activeSession ? `<button class="btn btn-primary btn-sm" onclick="setActive('${s.id}')">Set Active</button>` : ''}
                <button class="btn btn-red btn-sm" onclick="deleteSession('${s.id}')">🗑️</button>
              </div>
            </div>
          `;
        }).join('') || '<p>No sessions created.</p>'}
      </div>
    </div>
  `;
}

function createSession() {
  const sy = prompt('Enter start year (e.g., 2025):');
  const ey = prompt('Enter end year (e.g., 2026):');
  if (!sy || !ey) return;
  
  const id = sy + '-' + ey.slice(-2);
  if (sessions.find(s => s.id === id)) {
    alert('Session already exists.');
    return;
  }
  
  sessions.push({
    id,
    startYear: parseInt(sy),
    endYear: parseInt(ey),
    created: new Date().toISOString()
  });
  
  if (!activeSession) activeSession = id;
  saveAll();
  refreshSessionSelector();
  renderSessionsPage();
}

function setActive(sessionId) {
  activeSession = sessionId;
  saveAll();
  refreshSessionSelector();
  showPage('dashboard');
}

function deleteSession(sessionId) {
  if (sessionId === activeSession) {
    alert('Cannot delete active session.');
    return;
  }
  if (confirm(`Delete session ${sessionId}?`)) {
    sessions = sessions.filter(s => s.id !== sessionId);
    students = students.filter(s => s.session !== sessionId);
    saveAll();
    refreshSessionSelector();
    renderSessionsPage();
  }
}

function renderSettingsPage() {
  const users = JSON.parse(localStorage.getItem('pt_users') || '[]');
  
  document.getElementById('content-area').innerHTML = `
    <div class="panel">
      <div class="panel-head"><h3>⚙️ System Settings</h3></div>
      <div class="panel-body">
        <h4>User Accounts</h4>
        <table>
          <thead><tr><th>User ID</th><th>Role</th><th>Status</th></tr></thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td>${u.uid}</td>
                <td><span class="badge ${u.role === 'admin' ? 'badge-blue' : 'badge-yellow'}">${u.role}</span></td>
                <td><span class="badge ${u.active ? 'badge-green' : 'badge-red'}">${u.active ? 'Active' : 'Inactive'}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        
        <h4 style="margin-top:20px;">Change Password</h4>
        <div class="form-grid">
          <div class="form-group"><label>Current Password</label><input type="password" id="cp-old"></div>
          <div class="form-group"><label>New Password</label><input type="password" id="cp-new"></div>
        </div>
        <button class="btn btn-gold" onclick="changePassword()">Update Password</button>
      </div>
    </div>
  `;
}

function changePassword() {
  const oldPw = document.getElementById('cp-old')?.value;
  const newPw = document.getElementById('cp-new')?.value;
  
  if (!oldPw || !newPw || newPw.length < 6) {
    alert('Please fill both fields (min 6 characters).');
    return;
  }
  
  const users = JSON.parse(localStorage.getItem('pt_users') || '[]');
  const currentUser = JSON.parse(localStorage.getItem('pt_session') || '{}');
  
  const userIdx = users.findIndex(u => u.uid === currentUser.uid);
  if (userIdx >= 0) {
    if (users[userIdx].password !== btoa(oldPw)) {
      alert('Current password is incorrect.');
      return;
    }
    users[userIdx].password = btoa(newPw);
    localStorage.setItem('pt_users', JSON.stringify(users));
    alert('✅ Password updated! Please login again.');
    doLogout();
  }
}

// ─── MODAL HELPERS ───────────────────────────────────────────────
function closeModal(modalId) {
  const modal = document.getElementById(modalId);
  if (modal) modal.remove();
}

// ─── LOGOUT ──────────────────────────────────────────────────────
function doLogout() {
  localStorage.removeItem('pt_session');
  window.location.href = 'index.html';
}

// ─── INITIALIZATION ──────────────────────────────────────────────
(function init() {
  // Auth check
  const session = JSON.parse(localStorage.getItem('pt_session') || 'null');
  if (!session) {
    window.location.href = 'index.html';
    return;
  }
  
  // Check session expiry (8 hours)
  if (Date.now() - (session.loginTime || 0) > 8 * 60 * 60 * 1000) {
    localStorage.removeItem('pt_session');
    window.location.href = 'index.html';
    return;
  }
  
  // Set user info
  document.getElementById('topbar-user').textContent = session.name || session.uid || 'Admin';
  
  // Set today's date
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  
  // Migrate and initialize
  migrateData();
  refreshSessionSelector();
  
  // Show dashboard
  showPage('dashboard');
})();
