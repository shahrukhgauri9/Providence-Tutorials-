<svg width="200" height="240" viewBox="0 0 340 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d060"/>
      <stop offset="55%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#7a5c10"/>
    </linearGradient>
    <linearGradient id="bl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2255a0"/>
      <stop offset="100%" style="stop-color:#4a8ad4"/>
    </linearGradient>
    <linearGradient id="br" x1="0%" y1="0%" x2="100%" y2="0%">
