    <path d="M -3,-76 C -50,-74 -112,-58 -132,-32 L -128,10 C -108,-14 -48,-30 -3,0 Z" fill="url(#bl)" stroke="#1a2a6e" stroke-width="1"/>
    <line x1="-18" y1="-56" x2="-102" y2="-40" stroke="rgba(255,255,255,0.25)" stroke-width="1.4"/>
    <line x1="-18" y1="-40" x2="-98" y2="-26" stroke="rgba(255,255,255,0.18)" stroke-width="1.1"/>
    <path d="M 3,-76 C 50,-74 112,-58 132,-32 L 128,10 C 108,-14 48,-30 3,0 Z" fill="url(#br)" stroke="#1a2a6e" stroke-width="1"/>
    <line x1="18" y1="-56" x2="102" y2="-40" stroke="rgba(255,255,255,0.25)" stroke-width="1.4"/>
    <line x1="18" y1="-40" x2="98" y2="-26" stroke="rgba(255,255,255,0.18)" stroke-width="1.1"/>
    <ellipse cx="0" cy="10" rx="133" ry="14" fill="#0d1f5c"/>
