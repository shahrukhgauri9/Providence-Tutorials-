  </defs>
  <rect width="340" height="400" rx="20" fill="#0f2044"/>
  <!-- rays -->
  <g opacity="0.3">
    <polygon points="170,72 155,230 185,230" fill="url(#rg)"/>
    <polygon points="170,72 126,232 148,232" fill="url(#rg)" opacity="0.6"/>
    <polygon points="170,72 194,232 216,232" fill="url(#rg)" opacity="0.6"/>
  </g>
  <!-- star -->
