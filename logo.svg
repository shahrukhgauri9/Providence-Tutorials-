  <!-- text: PROVIDENCE -->
  <text x="170" y="362" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="26" font-weight="700" letter-spacing="2" fill="#c9a84c">PROVIDENCE</text>
  <!-- text: TUTORIALS -->
  <text x="170" y="386" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="16" font-weight="400" letter-spacing="5" fill="rgba(255,255,255,0.6)">TUTORIALS</text>
